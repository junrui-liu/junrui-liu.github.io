{{- $style := "" -}}
{{- with .Get "width" -}}
  {{- $val := printf "%v" . -}}
  {{- if findRE "^[0-9.]+$" $val -}}{{- $val = printf "%spx" $val -}}{{- end -}}
  {{- $style = printf "--img-width: %s;" $val -}}
{{- end -}}
<img class="slide-img" src="{{ .Get "src" }}" alt="{{ .Get "alt" }}" loading="lazy"{{ with $style }} style="{{ . | safeCSS }}"{{ end }}>
