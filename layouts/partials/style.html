<style>
  :root {
    --width: 720px;
    --font-main: Verdana, sans-serif;
    --font-secondary: Verdana, sans-serif;
    --font-scale: 1em;
    --background-color: #fff;
    --heading-color: #222;
    --text-color: #444;
    --link-color: #3273dc;
    --hover-color: #f4810f;
    --visited-color: #8b6fcb;
    --blockquote-color: #222;
    --nav-active-bg-light: #007acc;
    --nav-active-bg-dark: #007acc;
    --nav-active-color: #fff;
    --toc-border-color: #ddd;
    --toc-text-color: #556;
    --toc-active-bg: #f0f0f0;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --background-color: #01242e;
      --heading-color: #eee;
      --text-color: #ddd;
      --link-color: #8cc2dd;
      --visited-color: #8b6fcb;
      --blockquote-color: #ccc;
      --toc-border-color: #555;
      --toc-text-color: #aab;
      --toc-active-bg: #333;
    }
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font-secondary);
    font-size: var(--font-scale);
    margin: auto;
    padding: 20px;
    max-width: var(--width);
    text-align: left;
    background-color: var(--background-color);
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.5;
    color: var(--text-color);
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: var(--font-main);
    color: var(--heading-color);
  }

  a {
    color: var(--link-color);
    cursor: pointer;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
    color: var(--hover-color);
  }

  nav a {
    display: inline-block;
    margin-right: 8px;
    padding: 3px 3px;
    border-radius: 4px;
  }

  /* High-contrast highlight for the active nav item */
  nav a.active {
    background-color: var(--nav-active-bg-light);
    color: var(--nav-active-color);
    box-shadow: 0 2px 0 rgba(0, 0, 0, 0.15);
  }

  /* Fainter highlight for "you're inside this section" (e.g. an individual blog post) */
  nav a.active-section {
    background-color: color-mix(in srgb, var(--nav-active-bg-light) 25%, transparent);
    color: var(--text-color);
  }

  /* Prevent underline on the active nav link (including hover) */
  nav a.active,
  nav a.active:hover,
  nav a.active-section,
  nav a.active-section:hover {
    text-decoration: none;
  }

  @media (prefers-color-scheme: dark) {
    nav a.active {
      background-color: var(--nav-active-bg-dark);
      color: var(--nav-active-color);
    }
    nav a.active-section {
      background-color: color-mix(in srgb, var(--nav-active-bg-dark) 30%, transparent);
      color: var(--text-color);
    }
  }

  strong,
  b {
    color: var(--heading-color);
  }

  button {
    margin: 0;
    cursor: pointer;
  }

  time {
    font-family: monospace;
    font-style: normal;
    font-size: 15px;
  }

  main {
    line-height: 1.6;
  }

  table {
    width: 100%;
  }

  hr {
    border: 0;
    border-top: 1px dashed;
  }

  img {
    max-width: 100%;
  }

  code {
    font-family: monospace;
    padding: 2px;
    border-radius: 3px;
  }

  blockquote {
    border-left: 1px solid #999;
    color: var(--blockquote-color);
    padding-left: 20px;
    font-style: italic;
  }

  footer {
    padding: 25px 0;
    font-size: 0.9em;
    text-align: center;
  }

  .title:hover {
    text-decoration: none;
  }

  .title h1 {
    font-size: 1.5em;
  }

  .inline {
    width: auto !important;
  }

  .highlight,
  .code {
    border-radius: 3px;
    margin-block-start: 1em;
    margin-block-end: 1em;
    overflow-x: auto;
  }

  /* blog post list */
  ul.blog-posts {
    list-style-type: none;
    padding: unset;
  }

  ul.blog-posts li {
    display: flex;
  }

  ul.blog-posts li span {
    flex: 0 0 130px;
  }

  ul.blog-posts li a:visited {
    color: var(--visited-color);
  }

  .post-content {
    flex: 1;
  }

  .content-spacer {
    height: 40vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .repeat-symbol {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    color: var(--toc-text-color);
    font-size: 1.3em;
    line-height: 1;
    text-decoration: none;
    transition: color 0.3s, background-color 0.3s;
    padding: 10px 20px;
    border-radius: 5px;
  }

  .repeat-symbol:hover {
    color: var(--hover-color);
    background-color: var(--toc-active-bg);
    text-decoration: none;
  }

  .repeat-symbol .dots {
    display: inline-flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.25em;
    height: 1.1em;
    margin-right: 1px;
  }

  .repeat-symbol .dot {
    width: 4px;
    height: 4px;
    background-color: currentColor;
    border-radius: 50%;
  }

  .repeat-symbol .bar {
    display: inline-block;
    background-color: currentColor;
    height: 1.1em;
    border-radius: 1px;
  }

  .repeat-symbol .thin {
    width: 2px;
  }

  .repeat-symbol .thick {
    width: 5px;
  }

  .post-toc {
    position: fixed;
    top: 6rem;
    left: calc(50vw + var(--width) / 2 + 2rem);
    width: 220px;
    max-height: calc(100vh - 8rem);
    overflow-y: auto;
    font-size: 0.85em;
    line-height: 1.5;
    scrollbar-width: thin;
    scrollbar-color: var(--toc-border-color) transparent;
  }

  .post-toc nav ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .post-toc nav > ul {
    border-left: 2px solid var(--toc-border-color);
  }

  .post-toc nav li {
    margin: 0;
  }

  .post-toc nav a {
    display: block;
    color: var(--toc-text-color);
    text-decoration: none;
    padding: 0.2rem 0.75rem;
    margin-left: -2px;
    border-left: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
  }

  .post-toc nav ul ul a {
    padding-left: 1.5rem;
  }

  .post-toc nav ul ul ul a {
    padding-left: 2.25rem;
  }

  .post-toc nav a:hover {
    color: var(--hover-color);
    text-decoration: none;
  }

  .post-toc nav a.active-toc {
    color: var(--link-color);
    border-left-color: var(--link-color);
  }

  @media (max-width: 1199px) {
    .post-toc {
      display: none;
    }
  }
</style>
