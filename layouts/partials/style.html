<style>
  :root {
    --width: 720px;

    --font-body: 'Literata', Charter, 'Iowan Old Style', 'Apple Garamond',
      Cambria, Georgia, serif;
    --font-display: 'Fraunces', 'Literata', Charter, 'Iowan Old Style',
      Cambria, Georgia, serif;
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui,
      Roboto, 'Helvetica Neue', Arial, sans-serif;
    --font-mono: 'Fira Code', ui-monospace, 'SF Mono', Menlo, Monaco, Consolas,
      'Liberation Mono', monospace;

    --font-scale: 18px;
    --line-height: 1.7;

    /* Warm "paper" palette, Cal Poly green + gold accents */
    --background-color: #fdfbf6;
    --surface-color: #f4efe4;
    --border-color: #e8e0d1;
    --heading-color: #1c1814;
    --text-color: #3f3a33;
    --muted-color: #8a8170;
    --link-color: #154734;
    /* Cal Poly Green */
    --hover-color: #bd8b13;
    /* Cal Poly Gold */
    --visited-color: #4a6b53;
    /* desaturated green */
    --blockquote-color: #5b554b;
    --accent-gold-soft: #f3e9c8;

    --toc-border-color: #e2d9c5;
    --toc-text-color: #8a8170;
    --toc-active-bg: #ede7d4;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      /* Warm dark — like reading by lamplight */
      --background-color: #1a1714;
      --surface-color: #25201b;
      --border-color: #34302a;
      --heading-color: #f5efe4;
      --text-color: #d9d2c4;
      --muted-color: #9b9080;
      --link-color: #8fc8a8;
      /* light Cal Poly green */
      --hover-color: #e3bd5a;
      /* light Cal Poly gold */
      --visited-color: #b8a880;
      --blockquote-color: #b3a995;
      --accent-gold-soft: #332a1a;

      --toc-border-color: #34302a;
      --toc-text-color: #9b9080;
      --toc-active-bg: #2d271f;
    }
  }

  html {
    scroll-behavior: smooth;
    -webkit-text-size-adjust: 100%;
  }

  body {
    font-family: var(--font-body);
    font-size: var(--font-scale);
    font-weight: 420;
    line-height: var(--line-height);
    margin: auto;
    padding: 36px 24px 80px;
    max-width: var(--width);
    text-align: left;
    background-color: var(--background-color);
    color: var(--text-color);
    word-wrap: break-word;
    overflow-wrap: break-word;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'kern', 'liga', 'onum';
    font-variant-numeric: oldstyle-nums;
    font-variation-settings: 'opsz' 18;
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: var(--font-display);
    color: var(--heading-color);
    line-height: 1.15;
    letter-spacing: -0.012em;
    margin: 1.9em 0 0.55em;
    font-variant-numeric: normal;
    font-variation-settings: 'opsz' 36, 'SOFT' 50;
  }

  h1 {
    font-size: 2.4rem;
    font-weight: 600;
    letter-spacing: -0.022em;
    margin-top: 0.3em;
    margin-bottom: 0.5em;
    font-variation-settings: 'opsz' 72, 'SOFT' 80;
  }


  h2 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-top: 2.2em;
    font-variation-settings: 'opsz' 30, 'SOFT' 60;
  }

  h3 {
    font-size: 1.2rem;
    font-weight: 600;
    font-variation-settings: 'opsz' 24, 'SOFT' 50;
  }

  h4,
  h5,
  h6 {
    font-size: 1.04rem;
    font-weight: 600;
    font-variation-settings: 'opsz' 18, 'SOFT' 40;
  }

  p {
    margin: 0 0 1.1em;
  }

  em,
  i {
    font-style: italic;
  }

  a {
    color: var(--link-color);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: color-mix(in srgb, var(--link-color) 35%, transparent);
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    transition: color 0.15s ease, text-decoration-color 0.15s ease;
  }

  a:hover {
    color: var(--hover-color);
    text-decoration-color: currentColor;
  }

  /* Hover-to-reveal email placeholder */
  span.email[data-cipher] {
    cursor: help;
    color: var(--muted-color);
    transition: color 0.15s ease;
  }

  span.email[data-cipher]:hover {
    color: var(--link-color);
  }

  /* Author-name links: blend with surrounding text, reveal on hover */
  a.author-link,
  a.author-link:visited {
    color: inherit;
    text-decoration: none;
    transition: color 0.15s ease;
  }

  a.author-link:hover {
    color: var(--link-color);
    text-decoration: none;
  }

  /* ----- Header / top nav ----- */
  header {
    margin-bottom: 2.5em;
    padding-bottom: 0.5em;
  }

  .title h2 {
    font-family: var(--font-display);
    font-size: 1.55rem;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.02em;
    font-variation-settings: 'opsz' 36, 'SOFT' 90;
  }

  .title-rui {
    color: var(--muted-color);
  }

  .title {
    text-decoration: none;
  }

  .title:hover {
    text-decoration: none;
  }

  header nav {
    margin-top: 0.7em;
    margin-left: -10px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    font-family: var(--font-ui);
  }

  header nav a {
    display: inline-block;
    position: relative;
    margin: 0;
    padding: 4px 10px;
    border-radius: 6px;
    color: var(--muted-color);
    font-size: 0.92em;
    font-weight: 500;
    text-decoration: none;
    transition: background-color 0.15s ease, color 0.15s ease, transform 0.15s ease;
  }

  /* Gold underline marks the active page (and the active section). No underline on hover —
     hover is signaled by the pill background instead. */
  header nav a::after {
    content: '';
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: 1px;
    height: 0;
    border-top: 2px solid var(--hover-color);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), border-top-width 0.15s ease;
  }

  header nav a.active::after,
  header nav a.active-section::after {
    transform: scaleX(1);
  }

  header nav a.active::after {
    border-top-width: 3px;
  }

  /* Turnstile (⊢) wipes in from the left on hover and on the active page */
  header nav a::before {
    content: "\22A2";
    display: inline-block;
    width: 0;
    margin-right: 0;
    overflow: hidden;
    white-space: nowrap;
    line-height: 1;
    vertical-align: -0.08em;
    font-weight: 600;
    transition: width 0.2s ease, margin-right 0.2s ease;
  }

  header nav a:hover::before,
  header nav a.active::before,
  header nav a.active-section::before {
    width: 0.85em;
    margin-right: 4px;
  }

  header nav a:hover {
    background-color: var(--accent-gold-soft);
    color: var(--link-color);
    text-decoration: none;
    transform: translateY(-1px);
  }

  header nav a.active,
  header nav a.active:hover {
    background-color: transparent;
    color: var(--link-color);
    font-weight: 600;
  }

  header nav a.active-section,
  header nav a.active-section:hover {
    background-color: transparent;
    color: var(--link-color);
  }

  /* ----- Inline elements ----- */
  strong,
  b {
    color: var(--heading-color);
    font-weight: 600;
  }

  small {
    font-family: var(--font-ui);
    font-size: 0.82em;
    color: var(--muted-color);
    line-height: 1.4;
  }

  time {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-style: normal;
    font-size: 0.82em;
    color: var(--muted-color);
    letter-spacing: 0;
  }

  /* post date wrapper — kill the surrounding italic on the meta line */
  main>p>i {
    font-style: normal;
  }

  main {
    line-height: var(--line-height);
  }

  /* ----- Tables ----- */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.25em 0;
    font-size: 0.94em;
  }

  th,
  td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-color);
  }

  th {
    color: var(--heading-color);
    font-weight: 600;
    font-family: var(--font-ui);
  }

  hr {
    border: 0;
    border-top: 1px solid var(--border-color);
    margin: 2.2em auto;
    width: 60%;
  }

  img {
    max-width: 100%;
    border-radius: 4px;
  }

  /* Slide/screenshot images with opaque backgrounds: frame them as cards
     so they read as intentional on both paper and dark backgrounds.
     An optional `width` on the shortcode feeds --img-width. */
  .slide-img {
    border: 1px solid var(--border-color);
    border-radius: 6px;
    width: var(--img-width, auto);
    max-width: 100%;
  }

  @media (prefers-color-scheme: dark) {
    .slide-img {
      filter: brightness(0.87);
    }
  }

  /* Juxtapose several slide images (with optional text between) in one row.
     Images share the row equally (flex-basis 0) and shrink to fit, capped at
     their own --img-width, so all of them stay on a single line. */
  .slide-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    margin: 1.5rem 0;
  }

  .slide-row .slide-img {
    flex: 1 1 0;
    width: auto;
    min-width: 0;
    max-width: var(--img-width, 100%);
  }

  /* ----- Minecraft game diagrams (mc-game / mc-state / mc-arrow shortcodes) ----- */
  /* A diagram is a horizontal run of states and arrows. Whitespace between the
     nested shortcodes collapses because flex items ignore inter-item whitespace. */
  .mc-game {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.5rem 0.9rem;
    margin: 1.7rem 0;
    font-family: var(--font-ui);
  }

  /* One state: inventory stack, a double-line divider, then the goal. */
  .mc-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
  }

  .mc-inv,
  .mc-goal {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
  }

  /* Item = icon in a slot + a name caption underneath. */
  .mc-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .mc-slot {
    display: grid;
    place-items: center;
    width: 46px;
    height: 46px;
    box-sizing: border-box;
    padding: 6px;
    border: 1px solid var(--border-color);
    border-radius: 5px;
    /* Faint inventory-slot fill that reads on both paper and dark backgrounds. */
    background: color-mix(in srgb, var(--muted-color) 10%, transparent);
  }

  .mc-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    /* Keep the pixel art crisp when scaled up from 16-/32-px sources. */
    image-rendering: pixelated;
    border-radius: 0;
  }

  /* Generic placeholder items (A, B, C …) render as a lettered tile. */
  .mc-slot-generic {
    font-family: var(--font-mono);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--heading-color);
    background: var(--surface-color);
  }

  .mc-item-label {
    font-size: 0.74rem;
    line-height: 1;
    color: var(--muted-color);
  }

  /* The "====" separating inventory from goal: a themed double rule. */
  .mc-divider {
    width: 46px;
    height: 4px;
    border-top: 2px solid var(--muted-color);
    border-bottom: 2px solid var(--muted-color);
  }

  /* Transition arrow with an action label above the glyph. */
  .mc-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    align-self: center;
    color: var(--muted-color);
  }

  .mc-arrow-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--link-color);
    padding: 1px 8px;
    border: 1px solid var(--border-color);
    border-radius: 999px;
    background: var(--surface-color);
    white-space: nowrap;
  }

  .mc-arrow-glyph {
    font-size: 1.5rem;
    line-height: 1;
  }

  /* ----- Code ----- */
  code {
    font-family: var(--font-mono);
    font-size: 0.85em;
    padding: 0.12em 0.4em;
    background-color: var(--surface-color);
    border: 1px solid var(--border-color);
    border-radius: 4px;
  }

  pre {
    background-color: var(--surface-color);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 14px 16px;
    overflow-x: auto;
    line-height: 1.55;
    font-size: 0.85em;
  }

  pre code {
    padding: 0;
    background: none;
    border: none;
    border-radius: 0;
    font-size: 1em;
  }

  .highlight {
    border-radius: 6px;
    margin: 1.4em 0;
    overflow: hidden;
  }

  .highlight pre {
    margin: 0;
  }

  /* Keyword */ .chroma .k { color:#007020;font-weight:bold }

  /* Blend code backgrounds into the site palette */
  .bg,
  pre.chroma {
    background-color: var(--surface-color);
  }

    /* LiteralStringSingle */ .chroma .s1 { color:#b8bb26 }

  /* ----- Blockquote ----- */
  blockquote {

  /* ----- Collapsible answers (<details>) -----
     Once open, a revealed answer can run long enough that its end is
     ambiguous, so it borrows the blockquote's left rail to mark the span.
     The rail is present but transparent when closed, which reserves its
     space and keeps the summary from shifting on toggle. */
  details {
    margin: 1.4em 0;
    padding-left: 1.4em;
    border-left: 2px solid transparent;
  }

  details[open] {
    border-left-color: var(--border-color);
  }

  details > summary {
    /* Pulled back into the rail's gutter so the summary stays aligned with
       body text while the revealed content sits indented under the rail. */
    margin-left: -1.4em;

    font-family: var(--font-ui);
    font-size: 0.85em;
    color: var(--muted-color);
    list-style: none;
  }

  details > summary::-webkit-details-marker {
    display: none;
  }

  details > summary::before {
    content: "▸";
    display: inline-block;
    width: 1em;
    color: var(--muted-color);
  }

  details[open] > summary::before {
    content: "▾";
  }

  details > summary:hover {
    color: var(--hover-color);
  }

  details > summary:hover::before {
    color: var(--hover-color);
  }

  details[open] > summary {
    margin-bottom: 0.8em;

  details[open] > :last-child {

  /* ----- Lists ----- */
  ul,

  /* ----- Tags row (the <p> after the article body) ----- */
  article+p a {

  /* ----- Bell button on misc page ----- */
  .bell-btn {
    font-size: 1.2em;
    line-height: 1;
    background: none;
    border: none;
    margin: 0;
    padding: 0.4em 0.4em;
    cursor: pointer;
    border-radius: 50%;
    transition: background-color 0.2s ease, opacity 0.3s ease;
  }

  /* Hover shake — only when idle. Returns to neutral after the shake. */
  .bell-btn:hover:not(.primed):not(.playing) {
    animation: bell-shake 0.8s ease-in-out;
  }

  /* Primed: bell is held tilted to the right, "wound up" and ready to swing.
     A subtle periodic micro-wiggle around +30° suggests the bell is barely held in place. */
  .bell-btn.primed {
    transform: rotate(30deg);
    transition: transform 0.45s cubic-bezier(0.65, 0, 0.35, 1);
    animation: bell-primed-wiggle 2.5s 0.5s ease-in-out infinite;
  }

  @keyframes bell-primed-wiggle {
    0%, 65%, 100% { transform: rotate(30deg); }
    72%           { transform: rotate(27deg); }
    80%           { transform: rotate(33deg); }
    88%           { transform: rotate(28deg); }
    95%           { transform: rotate(32deg); }
  }

  /* While the chime is playing, the bell swings at 78 BPM (1 ring per ~0.77s = ~1.54s/cycle).
     Two animations run in sequence: a "release" cycle that drops from the +30° primed angle
     and decays into the steady-state amplitude, then an infinite swing oscillating at ±20°. */
  .bell-btn.playing,
  .bell-btn.playing:hover {
    animation:
      bell-swing-release 1.54s cubic-bezier(0.65, 0, 0.35, 1) forwards,
      bell-swing 1.54s cubic-bezier(0.65, 0, 0.35, 1) 1.54s infinite;
  }

  /* Hovering during playback fades the bell to signal "click to stop"; swing continues. */
  .bell-btn.playing:hover {
    opacity: 0.4;
  }

  /* First swing: released from the +30° primed angle, falls to −20°, settles at +20° steady. */
  @keyframes bell-swing-release {
    0%   { transform: rotate(30deg); }
    50%  { transform: rotate(-20deg); }
    100% { transform: rotate(20deg); }
  }

  /* Steady-state swing: oscillates at ±20° at 78 BPM. */
  @keyframes bell-swing {
    0%, 100% { transform: rotate(20deg); }
    50%      { transform: rotate(-20deg); }
  }

  /* Bell + message wrapper. The wrap sizes to the bell alone so the bell stays centered;
     the message is absolutely positioned out to the right so its text doesn't shift the bell. */
  .bell-wrap {
    position: relative;
    display: inline-block;
  }

  .bell-msg {
    position: absolute;
    left: 100%;
    top: 50%;
    transform: translateY(-50%);
    margin-left: 0.5em;
    white-space: nowrap;
    font-family: var(--font-ui);
    font-size: 0.78em;
    color: var(--muted-color);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .bell-msg:not(:empty) {
    opacity: 1;
  }

  .bell-btn:focus-visible {
    outline: 2px solid var(--link-color);
    outline-offset: 2px;
  }

  /* ----- Click-to-flip character on misc page ----- */
  .char-flip {
    display: inline-block;
    font: inherit;
    color: inherit;
    line-height: 1;
    background: none;
    border: none;
    margin: 0;
    padding: 0.1em 0.25em;
    cursor: pointer;
    border-radius: 4px;
    backface-visibility: hidden;
    transition: background-color 0.2s ease;

  .char-flip:focus-visible {

  .char-flip.flipping {

  }

  @keyframes char-flip {
    0% {
      transform: perspective(400px) rotateY(0deg);
    }

    100% {
      transform: perspective(400px) rotateY(360deg);
    }
  }

  /* Shake decays back to neutral (0°). Only fires on hover when bell is idle. */
  @keyframes bell-shake {

    0%,
    100% {
      transform: rotate(0deg);
    }

    15% {
      transform: rotate(-18deg);
    }

    30% {
      transform: rotate(14deg);
    }

    45% {
      transform: rotate(-10deg);
    }

    60% {
      transform: rotate(7deg);
    }

    80% {
      transform: rotate(-4deg);
    }
  }

  /* Spacer + back-to-top symbol */
  .content-spacer {
    height: 28vh;
    display: flex;
    align-items: center;
    justify-content: center;

  .repeat-symbol {
    display: inline-flex;
    align-items: center;
    gap: 3px;

    line-height: 1;
    text-decoration: none;
    transition: color 0.2s ease, background-color 0.2s ease;
    padding: 10px 20px;
    border-radius: 8px;
  }

  .repeat-symbol:hover {
    color: var(--hover-color);
    background-color: var(--toc-active-bg);
    text-decoration: none;
  }

  .repeat-symbol .dots {
    display: inline-flex;

  }

  .repeat-symbol .dot {
    width: 4px;

  }

  .repeat-symbol .bar {

  .repeat-symbol .thin {
    width: 2px;
  }

  .repeat-symbol .thick {
    width: 5px;
  }

  /* ----- Table of contents ----- */
  /* A zero-height sticky rail, bounded by the article (its parent). It pins
     to the viewport bottom while the body is tall, then rides up smoothly
     with the body once the body's end scrolls past — all compositor-driven,
     so there's no scroll jank. */
  .post-toc-rail {
    position: sticky;
    bottom: 2rem;
    height: 0;
    z-index: 1;
  }

  .post-toc {
    position: absolute;
    bottom: 0;
    /* The reading column and this gutter are both centred on 50vw, so the
       horizontal offset between them is constant (the 50vw cancels): the
       column's left padding (24px) + the gap (2rem) + the TOC's own width. */
    left: calc(-170px - 2rem - 24px);
    width: 170px;
    max-height: calc(100vh - 8rem);
    overflow-y: auto;
    font-family: var(--font-ui);
    font-size: 0.82em;
    line-height: 1.5;
    scrollbar-width: thin;
    scrollbar-color: var(--toc-border-color) transparent;
  }

  .post-toc nav {
    margin: 0;
    display: block;
    gap: 0;
    font-family: var(--font-ui);
  }

  .post-toc nav ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .post-toc nav>ul {
    border-left: 2px solid var(--toc-border-color);
  }

  .post-toc nav li {
    margin: 0;
  }

  .post-toc nav a {
    display: block;
    color: var(--toc-text-color);
    background: none;
    text-decoration: none;
    text-align: left;
    padding: 0.2rem 0.75rem;
    margin: 0 0 0 -2px;
    border-left: 2px solid transparent;
    border-radius: 0;
    font-size: 1em;
    font-weight: 400;
    transition: color 0.15s ease, border-color 0.15s ease;
  }

  .post-toc nav ul ul a {
    padding-left: 1.5rem;
  }

  .post-toc nav ul ul ul a {
    padding-left: 2.25rem;
  }

  /* Sub-sections stay hidden until their parent section is the one being
     read; the enclosing JS toggles .toc-expanded as the reader scrolls.
     A plain display toggle (rather than max-height + overflow) avoids
     clipping the active ###'s side-line, which sits 2px into the left
     margin to align with the bar. */
  .post-toc.js-toc nav>ul>li>ul {
    display: none;
  }

  .post-toc.js-toc nav>ul>li.toc-expanded>ul {
    display: block;
  }

  .post-toc nav a:hover {
    color: var(--hover-color);
    background: none;
    text-decoration: none;
  }

  .post-toc nav a.active-toc,
  .post-toc nav a.active-toc:hover {
    color: var(--link-color);
    border-left-color: var(--link-color);
    background: none;
  }

  /* Parent (##) of the ### currently being read: keep its side-line fully
     lit, the same as a directly-active section. */
  .post-toc nav a.active-toc-parent {
    border-left-color: var(--link-color);
  }

  /* The nested (###) heading you're actually in gets a softer side-line, so
     the parent (##) reads as the primary marker. Fading toward transparent
     (rather than the border color) keeps it visible in both light and dark,
     where the border color pulls in opposite contrast directions. */
  .post-toc nav ul ul a.active-toc {
    border-left-color: color-mix(in srgb, var(--link-color) 35%, transparent);
  }

  /* ----- Footnotes → Tufte sidenotes ----- */
  /* Inline reference marker in the body text. */
  .footnote-ref a {
    text-decoration: none;
    color: var(--link-color);
    font-weight: 500;
    padding: 0 0.1em;
  }

  /* Bottom footnote list: shown on narrow screens and when JS is off. */
  .footnotes {

    color: var(--muted-color);

  .footnotes hr {

  .footnotes ol {

  }

  .footnote-backref {
    text-decoration: none;
    margin-left: 0.3em;
  }

  /* Sidenote injected by JS next to its reference. Hidden until there is
     room for a right gutter (see the min-width rule below). */
  .sidenote {
    display: none;
    font-family: var(--font-body);
    font-size: 0.85em;
    line-height: 1.5;
    color: var(--muted-color);
    text-align: left;
  }

  .sidenote p {
    margin: 0 0 0.5em;
  }

  .sidenote p:last-child {
    margin-bottom: 0;
  }

  .sidenote-number {
    color: var(--link-color);
    font-weight: 600;
    margin-right: 0.15em;
  }

  /* Spoiler markup (the "spoiler" shortcode emits span.spoiler): blur the
     marked text until the reader hovers or focuses the note it lives in.
     Mirrors the hover-to-reveal treatment on the email address. Any surrounding
     text (e.g. a "Spoiler:" label) stays sharp as a teaser. */
  .spoiler {
    filter: blur(4.5px);
    transition: filter 0.25s ease;
  }

  .sidenote:has(.spoiler),
  .footnotes li:has(.spoiler) {
    cursor: help;
    outline: none;
  }

  .sidenote:hover .spoiler,
  .sidenote:focus-within .spoiler,
  .footnotes li:hover .spoiler,
  .footnotes li:focus-within .spoiler {
    filter: blur(0);
  }

  @media (prefers-reduced-motion: reduce) {
    .spoiler {
      transition: none;
    }
  }

  @media (min-width: 1140px) {
    /* Tufte layout: narrow the reading measure so the freed space on the
       right becomes a proper margin for wide sidenotes. Text stays flush
       left (aligned with the header), notes live to its right. */
    .tufte-body {
      max-width: 600px;
    }

    /* Float each note into the margin. The negative right margin lets the
       box sit outside the (now narrow) text column without reflowing text. */
    .sidenote {
      display: block;
      float: right;
      clear: right;
      width: 240px;
      margin: 0.2rem -264px 1.2rem 0;
    }

    /* Notes now live in the margin, so hide the bottom pile. */
    .footnotes {
      display: none;
    }
  }

  @media (max-width: 1139px) {
    .post-toc {
      display: none;
    }
  }
