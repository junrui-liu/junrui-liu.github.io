{{ range .Site.Menus.main }}
{{ $active := or (eq $.RelPermalink .URL) (eq $.Permalink .URL) }}
{{ $menuSection := trim .URL "/" }}
{{ $sectionActive := and (not $active) (ne $menuSection "") (eq $.Section $menuSection) }}
<a href="{{ .URL }}"
  {{ if $active }} class="active"
  {{ else if $sectionActive }} class="active-section"
  {{ end }}>{{ .Name }}</a>
{{ end }}
