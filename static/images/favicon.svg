<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
  <!-- White rounded-corner badge so the icon stays readable on any tab background -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#ffffff" />
  <!-- Two dots (the colon of :|| ) -->
  <circle cx="6.5" cy="12" r="2.4" fill="#154734" />
  <circle cx="6.5" cy="20" r="2.4" fill="#154734" />
  <!-- Thin bar -->
  <rect x="11.5" y="6" width="2" height="20" rx="0.5" fill="#154734" />
  <!-- Thick bar (doubles as the turnstile's vertical) -->
  <rect x="16.5" y="6" width="5" height="20" rx="0.5" fill="#154734" />
  <!-- Turnstile arm extending right from the middle of the thick bar -->
  <rect x="21.5" y="14.75" width="6" height="2.5" rx="0.5" fill="#154734" />
</svg>
